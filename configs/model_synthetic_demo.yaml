model:
  name: transformer_synthetic_demo
  target: delta_expression
  perturbation_injection: additive_to_all_gene_tokens
  use_positional_encoding: false
  gene_order: synthetic_gene_index

transformer:
  d_model: 64
  n_heads: 4
  n_layers: 2
  ffn_dim: 128
  dropout: 0.1

input:
  hvg_count: 64
  max_hvg_without_memory_estimate: 64
  value_encoder: linear_scalar_projection

memory_guardrails:
  recommended_hvg_min: 64
  recommended_hvg_max: 64
  prefer_standard_attention: true
