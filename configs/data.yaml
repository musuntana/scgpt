dataset:
  name: scperturb_norman2019
  source: scPerturb benchmark
  cell_context: K562
  include_single_gene_only: true
  exclude_multi_gene_perturbations: true
  control_label: auto
  raw_path: data/raw/NormanWeissman2019_filtered.h5ad
  download_url: https://zenodo.org/records/10044268/files/NormanWeissman2019_filtered.h5ad?download=1
  expected_md5: c870e6967d91c017d9da827bab183cd6

schema:
  preset: scperturb_norman2019
  perturbation_col: auto
  batch_col: auto
  context_cols:
    - celltype_new
  control_label_candidates:
    - control
    - ctrl
    - ntc
    - non-targeting
    - nontargeting
    - unperturbed
  perturbation_col_candidates:
    - perturbation_canonical
    - perturbation_new
    - perturbation
    - condition
    - target_gene
    - gene
  batch_col_candidates:
    - batch
    - gemgroup
    - lane
    - donor
  context_col_candidates:
    - celltype_new
    - celltype
    - cell_line
  multi_gene_delimiters:
    - ";"
    - "+"
    - ","
    - "|"
    - "_"

preprocess:
  min_genes_per_cell: 200
  min_cells_per_gene: 3
  normalize_total_target_sum: 10000
  log1p: true
  hvg_top_genes: 512
  hvg_upper_bound: 800
  sparse_to_dense_after_hvg: true
  dense_dtype: float32
  max_cells_per_perturbation: 500

pairing:
  target: delta_expression
  strategy: batch_aware_control_mean
  fallback_strategy: global_control_mean_within_cell_context

split:
  seen_protocol: stratified_within_perturbation_condition
  unseen_protocol: grouped_by_perturbation_gene
  val_fraction: 0.1
  test_fraction: 0.1
  random_seed: 42
